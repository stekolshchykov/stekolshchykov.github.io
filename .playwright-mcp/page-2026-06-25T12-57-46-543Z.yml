        - heading "Blackrock Family Kitchen" [level=2] [ref=e51]
        - paragraph [ref=e52]: A full kitchen redesign for a Victorian-era home in Blackrock. The family wanted a contemporary kitchen that respected the original proportions of the house and could absorb both weekday routine and larger gatherings.
      - generic [ref=e53]:
        - generic [ref=e54]:
          - text: Challenge
          - paragraph [ref=e55]: Ceiling heights varied across the room, and the existing chimney breast limited wall-run continuity. The client also requested a large island with seating without sacrificing circulation.
        - generic [ref=e56]:
