          - paragraph [ref=e57]: We wrapped the chimney breast in handleless charcoal lacquer and extended the run with floor-to-ceiling units. The island houses a sink, bin, and breakfast storage beneath a honed quartz worktop. Oak internals add warmth each time a door opens.
