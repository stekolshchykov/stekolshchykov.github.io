          - heading "1. Identity & Contact Details of the Data Controller" [level=2] [ref=e24]
          - generic [ref=e25]:
            - paragraph [ref=e26]: This Privacy Policy explains how [Existing Company Name] (trading as TINEO) collects, uses, and protects your personal data.
            - paragraph [ref=e27]: "Data controller: [Existing Company Name]"
            - paragraph [ref=e28]: "Registered address: [Registered Office Address], Ireland."
            - paragraph [ref=e29]: "Operational address: Dublin, Ireland."
            - paragraph [ref=e30]: "Email: hello@tineo.ie"
            - paragraph [ref=e31]: "Telephone: +353 87 123 4567"
        - article [ref=e32]:
          - heading "2. Data Protection Officer" [level=2] [ref=e33]
          - paragraph [ref=e35]: "[Existing Company Name] is not currently required to appoint a Data Protection Officer under Article 37 GDPR. Questions about data protection should be directed to hello@tineo.ie."
        - article [ref=e36]:
          - heading "3. Categories of Personal Data Collected" [level=2] [ref=e37]
          - generic [ref=e38]:
            - paragraph [ref=e39]: We collect personal data that you provide through our contact form, email, telephone, or in-person consultations. This may include your name, email address, phone number, project location, project type, budget range, message, and any files or images you upload.
            - paragraph [ref=e40]: We also collect technical data via cookies and similar technologies when you browse our website, including IP address, browser type, device information, and pages visited.
        - article [ref=e41]:
          - heading "4. Purposes & Legal Basis for Processing" [level=2] [ref=e42]
          - generic [ref=e43]:
            - paragraph [ref=e44]: "We process your personal data for the following purposes and on the following legal bases:"
            - paragraph [ref=e45]: (a) To respond to enquiries and provide quotes — performance of pre-contractual measures or contract.
            - paragraph [ref=e46]: (b) To manage projects, communicate during design and installation — performance of contract.
            - paragraph [ref=e47]: (c) To send occasional project updates or marketing communications — consent, which you can withdraw at any time.
            - paragraph [ref=e48]: (d) To improve our website and understand visitor behaviour — legitimate interest, where consent is not required, or consent for non-essential cookies.
        - article [ref=e49]:
          - heading "5. Recipients & Third-Party Processors" [level=2] [ref=e50]
          - generic [ref=e51]:
            - paragraph [ref=e52]: Your personal data may be shared with trusted third-party service providers who assist us in operating our business, such as form processing services, email providers, hosting platforms, and analytics providers.
            - paragraph [ref=e53]: We do not sell your personal data. Any third-party processors are contractually bound to use your data only for the specified purposes and to protect it in accordance with GDPR.
        - article [ref=e54]:
          - heading "6. International Transfers" [level=2] [ref=e55]
          - paragraph [ref=e57]: Some of our processors may store or process data outside the European Economic Area. Where this occurs, we ensure appropriate safeguards are in place, such as Standard Contractual Clauses approved by the European Commission, or processing in countries recognised as providing an adequate level of protection.
        - article [ref=e58]:
          - heading "7. Retention Periods" [level=2] [ref=e59]
          - generic [ref=e60]:
            - paragraph [ref=e61]: We retain your personal data only for as long as necessary to fulfil the purposes for which it was collected. Enquiry data is typically retained for up to two years unless you request deletion earlier.
            - paragraph [ref=e62]: Project records, including contracts and correspondence, are retained for the duration required by applicable law, including tax and warranty obligations.
        - article [ref=e63]:
          - heading "8. Your Data Subject Rights" [level=2] [ref=e64]
          - generic [ref=e65]:
            - paragraph [ref=e66]: Under GDPR, you have the right to access, rectify, erase, restrict, or object to the processing of your personal data. You also have the right to data portability and to withdraw consent at any time.
            - paragraph [ref=e67]: To exercise any of these rights, please contact us at hello@tineo.ie. We will respond within one month of receiving your request.
        - article [ref=e68]:
          - heading "9. Right to Lodge a Complaint" [level=2] [ref=e69]
          - generic [ref=e70]:
            - paragraph [ref=e71]: If you believe we have not handled your personal data in accordance with the law, you have the right to lodge a complaint with the Data Protection Commission of Ireland.
            - paragraph [ref=e72]: "Website: www.dataprotection.ie"
        - article [ref=e73]:
          - heading "10. Voluntary Nature of Data & Automated Decision-Making" [level=2] [ref=e74]
          - generic [ref=e75]:
            - paragraph [ref=e76]: Providing your personal data is voluntary, but we may not be able to respond to your enquiry or proceed with a project without certain information.
            - paragraph [ref=e77]: We do not use automated decision-making or profiling that produces legal or similarly significant effects on individuals.
