        - paragraph [ref=e45]: A full kitchen redesign for a Victorian-era home in Blackrock. The family wanted a contemporary kitchen that respected the original proportions of the house and could absorb both weekday routine and larger gatherings.
      - generic [ref=e46]:
        - generic [ref=e47]:
          - text: Challenge
          - paragraph [ref=e48]: Ceiling heights varied across the room, and the existing chimney breast limited wall-run continuity. The client also requested a large island with seating without sacrificing circulation.
