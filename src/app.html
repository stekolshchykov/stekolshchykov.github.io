<!doctype html>
<html lang="en">
	<head>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1" />
		<meta name="text-scale" content="scale" />
		<link rel="preload" as="style" href="/fonts/fonts.css" />
		<link rel="stylesheet" href="/fonts/fonts.css" />
		<style>
			#aras-initial-preloader {
				position: fixed;
				inset: 0;
				z-index: 10080;
				display: grid;
				place-items: center;
				overflow: hidden;
				background:
					radial-gradient(circle at 72% 44%, rgba(196, 149, 106, 0.16), transparent 30rem),
					linear-gradient(135deg, #07070b 0%, #0a0a0f 48%, #111118 100%);
				color: #f0ebe3;
				isolation: isolate;
				pointer-events: all;
			}

			#aras-initial-preloader::before,
			#aras-initial-preloader::after {
				content: '';
				position: absolute;
				inset: clamp(1rem, 4vw, 4rem);
				pointer-events: none;
				opacity: 0.62;
			}

			#aras-initial-preloader::before {
				border-top: 1px solid rgba(196, 149, 106, 0.36);
				border-bottom: 1px solid rgba(196, 149, 106, 0.18);
				transform: scaleX(0);
				animation: aras-preloader-rail-x 900ms cubic-bezier(0.22, 1, 0.36, 1) 140ms forwards;
			}

			#aras-initial-preloader::after {
				border-left: 1px solid rgba(196, 149, 106, 0.22);
				border-right: 1px solid rgba(196, 149, 106, 0.36);
				transform: scaleY(0);
				animation: aras-preloader-rail-y 900ms cubic-bezier(0.22, 1, 0.36, 1) 260ms forwards;
			}

			.aras-preloader__noise {
				position: absolute;
				inset: 0;
				opacity: 0.035;
				background-image: url('data:image/svg+xml,%3Csvg viewBox=%220 0 400 400%22 xmlns=%22http://www.w3.org/2000/svg%22%3E%3Cfilter id=%22noise%22%3E%3CfeTurbulence type=%22fractalNoise%22 baseFrequency=%220.82%22 numOctaves=%223%22 stitchTiles=%22stitch%22/%3E%3C/filter%3E%3Crect width=%22100%25%22 height=%22100%25%22 filter=%22url(%23noise)%22/%3E%3C/svg%3E');
			}

			.aras-preloader__panel {
				position: relative;
				z-index: 2;
				width: min(78vw, 34rem);
				text-align: center;
			}

			.aras-preloader__mark {
				margin: 0 auto 1.1rem;
				width: 4.8rem;
				height: 4.8rem;
				display: grid;
				place-items: center;
				border: 1px solid rgba(196, 149, 106, 0.28);
				border-radius: 999px;
				color: #c4956a;
				font-family: 'Cormorant Garamond', Georgia, serif;
				font-size: 2.4rem;
				font-weight: 300;
				line-height: 1;
				opacity: 0;
				transform: translateY(16px) scale(0.96);
				animation: aras-preloader-mark 760ms cubic-bezier(0.22, 1, 0.36, 1) 240ms forwards;
			}

			.aras-preloader__wordmark {
				margin: 0;
				font-family: 'Cormorant Garamond', Georgia, serif;
				font-size: clamp(2.6rem, 7vw, 5.2rem);
				font-weight: 300;
				letter-spacing: 0;
				line-height: 0.94;
				opacity: 0;
				transform: translateY(22px);
				animation: aras-preloader-word 820ms cubic-bezier(0.22, 1, 0.36, 1) 360ms forwards;
			}

			.aras-preloader__label {
				margin: 1rem 0 0;
				font-family: Inter, ui-sans-serif, system-ui, sans-serif;
				font-size: 0.68rem;
				font-weight: 500;
				letter-spacing: 0.2em;
				text-transform: uppercase;
				color: rgba(240, 235, 227, 0.56);
				opacity: 0;
				transform: translateY(12px);
				animation: aras-preloader-label 640ms ease 680ms forwards;
			}

			.aras-preloader__line {
				position: relative;
				margin: 1.6rem auto 0;
				width: min(16rem, 58vw);
				height: 1px;
				overflow: hidden;
				background: rgba(240, 235, 227, 0.14);
				opacity: 0;
				animation: aras-preloader-label 520ms ease 760ms forwards;
			}

			.aras-preloader__line span {
				position: absolute;
				inset: 0;
				background: linear-gradient(90deg, transparent, #c4956a 42%, #f0ebe3 50%, #c4956a 58%, transparent);
				transform: translateX(-100%);
				animation: aras-preloader-sweep 1.35s cubic-bezier(0.65, 0, 0.35, 1) 820ms infinite;
			}

			html.aras-preloader-exit #aras-initial-preloader {
				animation: aras-preloader-exit 920ms cubic-bezier(0.65, 0, 0.35, 1) forwards;
			}

			html.aras-preloader-exit #aras-initial-preloader::before,
			html.aras-preloader-exit #aras-initial-preloader::after {
				animation-play-state: paused;
			}

			html.aras-preloader-done #aras-initial-preloader,
			html.aras-preloader-fallback #aras-initial-preloader {
				display: none;
			}

			@keyframes aras-preloader-rail-x {
				to {
					transform: scaleX(1);
				}
			}

			@keyframes aras-preloader-rail-y {
				to {
					transform: scaleY(1);
				}
			}

			@keyframes aras-preloader-mark {
				to {
					opacity: 1;
					transform: translateY(0) scale(1);
				}
			}

			@keyframes aras-preloader-word {
				to {
					opacity: 1;
					transform: translateY(0);
				}
			}

			@keyframes aras-preloader-label {
				to {
					opacity: 1;
					transform: translateY(0);
				}
			}

			@keyframes aras-preloader-sweep {
				0% {
					transform: translateX(-100%);
				}
				58%,
				100% {
					transform: translateX(100%);
				}
			}

			@keyframes aras-preloader-exit {
				0% {
					clip-path: inset(0 0 0 0);
					opacity: 1;
					transform: translateY(0);
				}
				58% {
					clip-path: inset(0 0 0 0);
					opacity: 1;
				}
				100% {
					clip-path: inset(0 0 100% 0);
					opacity: 0.98;
					transform: translateY(-1.5rem);
				}
			}

			@media (max-width: 767px) {
				.aras-preloader__mark {
					width: 4rem;
					height: 4rem;
					font-size: 2rem;
				}
			}

			@media (prefers-reduced-motion: reduce) {
				#aras-initial-preloader,
				#aras-initial-preloader::before,
				#aras-initial-preloader::after,
				.aras-preloader__mark,
				.aras-preloader__wordmark,
				.aras-preloader__label,
				.aras-preloader__line,
				.aras-preloader__line span {
					animation: none !important;
					transform: none !important;
					opacity: 1 !important;
				}
			}
		</style>
		<script>
			window.setTimeout(function () {
				document.documentElement.classList.add('aras-preloader-fallback');
			}, 4200);
		</script>
		%sveltekit.head%
	</head>
	<body data-sveltekit-preload-data="hover">
		<div id="aras-initial-preloader" aria-hidden="true">
			<div class="aras-preloader__noise"></div>
			<div class="aras-preloader__panel">
				<div class="aras-preloader__mark">Á</div>
				<p class="aras-preloader__wordmark">Áras Living</p>
				<p class="aras-preloader__label">Fitted cabinetry</p>
				<div class="aras-preloader__line"><span></span></div>
			</div>
		</div>
		<div style="display: contents">%sveltekit.body%</div>
	</body>
</html>
